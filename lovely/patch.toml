[manifest]
version = "1.0.0"

# ─── functions/UI_definitions.lua — money display uses RTL font ───────────────

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "font = G.LANGUAGES['en-us'].font, shadow = true,spacing = 2, bump = true, scale = 2.2*scale}), id = 'dollar_text_UI'"
position = "at"
match_indent = true
payload = "font = (G.SETTINGS and G.SETTINGS.language == 'he' and G.LANG) and G.LANG.font or G.LANGUAGES['en-us'].font, shadow = true,spacing = 2, bump = true, scale = 2.2*scale}), id = 'dollar_text_UI'"
